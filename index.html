<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio | معرض أعمالي</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                        poppins: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3b82f6',
                        dark: '#0f172a',
                    }
                }
            }
        }
    </script>

    <style>
        :root { --font-main: 'Poppins', sans-serif; }
        html[lang="ar"] { --font-main: 'Cairo', sans-serif; }
        body { font-family: var(--font-main); transition: background-color 0.3s, color 0.3s; }
        .hero-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .logo-container img { transition: opacity 0.3s ease-in-out; }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 overflow-x-hidden">

    <!-- Header / Nav -->
    <nav class="fixed w-full z-50 top-0 left-0 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">

            <!-- Logo -->
            <div class="logo-container h-12 flex items-center">
                <img src="22.png" id="logo-day" alt="Logo" class="h-full object-contain block dark:hidden">
                <img src="33.png" id="logo-night" alt="Logo" class="h-full object-contain hidden dark:block">
            </div>

            <!-- Desktop Menu -->
            <div class="hidden md:flex items-center justify-between w-full max-w-xl">
                <a href="#home" class="hover:text-primary transition font-medium">Home</a>
                <a href="#about" class="hover:text-primary transition font-medium">About</a>
                <a href="#skills" class="hover:text-primary transition font-medium">Skills</a>
                <a href="#projects" class="hover:text-primary transition font-medium">Projects</a>
                <a href="#contact" class="hover:text-primary transition font-medium">Contact</a>
            </div>

            <!-- Controls -->
            <div class="flex items-center gap-3">

                <!-- Language Toggle -->
                <button id="lang-toggle" class="px-3 py-1 text-sm font-bold border border-slate-200 dark:border-slate-800 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                    AR
                </button>

                <!-- Theme Toggle -->
                <button id="theme-toggle" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:scale-110 transition">
                    <i data-lucide="sun" id="sun-icon" class="hidden w-5 h-5"></i>
                    <i data-lucide="moon" id="moon-icon" class="w-5 h-5"></i>
                </button>

            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="min-h-screen pt-32 pb-20 flex items-center relative overflow-hidden">
        <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">

            <!-- Text -->
            <div class="relative z-10 text-start">
                <h2 class="text-primary font-bold text-lg mb-4">Abdulrahman Shunnar</h2>

                <h1 class="text-5xl md:text-7xl font-extrabold mb-6 leading-tight">
                    Creative <br> <span class="text-transparent bg-clip-text hero-gradient">Frontend Developer</span>
                </h1>

                <p class="text-lg text-slate-600 dark:text-slate-400 mb-8 max-w-lg">
                    I build beautiful and functional digital web experiences with a strong focus on usability and performance.
                </p>

                <div class="flex gap-4">
                    <a href="#projects" class="px-8 py-4 hero-gradient text-white rounded-xl font-bold shadow-lg shadow-blue-500/20 hover:shadow-blue-500/40 transition flex items-center">
                        View Projects
                    </a>
                </div>
            </div>

            <!-- Hero Image -->
            <div class="relative">
                <img src="day-photo.png" class="w-full h-full object-cover rounded-xl shadow-xl block dark:hidden">
                <img src="night-photo.png" class="w-full h-full object-cover rounded-xl shadow-xl hidden dark:block">
            </div>

        </div>
    </section>

</body>
</html>
