<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdulrahman Shannar | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                        poppins: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3b82f6',
                        dark: '#0f172a',
                    }
                }
            }
        }
    </script>
    <style>
        :root { --font-main: 'Poppins', sans-serif; }
        html[lang="ar"] { --font-main: 'Cairo', sans-serif; }
        body { font-family: var(--font-main); transition: background-color 0.3s, color 0.3s; }
        .hero-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .logo-container img { transition: opacity 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 overflow-x-hidden">

    <nav class="fixed w-full z-50 top-0 left-0 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="logo-container h-12 flex items-center">
                <img src="22.png" id="logo-day" alt="Logo" class="h-full object-contain block dark:hidden">
                <img src="33.png" id="logo-night" alt="Logo" class="h-full object-contain hidden dark:block">
            </div>
            
            <div class="hidden md:flex items-center justify-between w-full max-w-xl">
                <a href="#home" data-t="nav_home" class="hover:text-primary transition font-medium">Home</a>
                <a href="#about" data-t="nav_about" class="hover:text-primary transition font-medium">About</a>
                <a href="#skills" data-t="nav_skills" class="hover:text-primary transition font-medium">Skills</a>
                <a href="#projects" data-t="nav_projects" class="hover:text-primary transition font-medium">Projects</a>
                <a href="#contact" data-t="nav_contact" class="hover:text-primary transition font-medium">Contact Me</a>
            </div>

            <div class="flex items-center gap-3">
                <button id="lang-toggle" class="px-3 py-1 text-sm font-bold border border-slate-200 dark:border-slate-800 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                    AR
                </button>
                <button id="theme-toggle" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:scale-110 transition">
                    <i data-lucide="sun" id="sun-icon" class="hidden w-5 h-5"></i>
                    <i data-lucide="moon" id="moon-icon" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </nav>

    <section id="home" class="min-h-screen pt-32 pb-20 flex items-center relative overflow-hidden">
        <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
            <div class="relative z-10 text-start">
                <h2 data-t="hero_welcome" class="text-primary font-bold text-lg mb-4">Abdulrahman Shannar</h2>
                <h1 class="text-5xl md:text-7xl font-extrabold mb-6 leading-tight">
                    <span data-t="hero_title">Frontend</span> <br> <span class="text-transparent bg-clip-text hero-gradient" data-t="hero_accent">Developer</span>
                </h1>
                <p data-t="hero_desc" class="text-lg text-slate-600 dark:text-slate-400 mb-8 max-w-lg">
                    I build beautiful and functional digital web experiences, with a full focus on usability and high performance.
                </p>
                <div class="flex gap-4">
                    <a href="#projects" data-t="btn_projects" class="px-8 py-4 hero-gradient text-white rounded-xl font-bold shadow-lg shadow-blue-500/20 hover:shadow-blue-500/40 transition flex items-center gap-2">
                        View Projects
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Language Management
        const translations = {
            en: {
                nav_home: "Home",
                nav_about: "About",
                nav_skills: "Skills",
                nav_projects: "Projects",
                nav_contact: "Contact Me",
                hero_welcome: "Abdulrahman Shannar",
                hero_title: "Frontend",
                hero_accent: "Developer",
                hero_desc: "I build beautiful and functional digital web experiences, with a full focus on usability and high performance.",
                btn_projects: "View Projects"
            },
            ar: {
                nav_home: "الرئيسية",
                nav_about: "عني",
                nav_skills: "المهارات",
                nav_projects: "المشاريع",
                nav_contact: "تواصل معي",
                hero_welcome: "عبدالرحمن شنار",
                hero_title: "مطور واجهات",
                hero_accent: "مبدع",
                hero_desc: "أقوم ببناء تجارب ويب رقمية جميلة وعملية، مع التركيز التام على سهولة الاستخدام والأداء العالي.",
                btn_projects: "عرض المشاريع"
            }
        };

        const langToggle = document.getElementById('lang-toggle');
        let currentLang = 'en';

        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            langToggle.innerText = currentLang === 'en' ? 'AR' : 'EN';
            
            document.querySelectorAll('[data-t]').forEach(el => {
                const key = el.getAttribute('data-t');
                el.innerText = translations[currentLang][key];
            });
        });

        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');

        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            sunIcon.classList.toggle('hidden', !isDark);
            moonIcon.classList.toggle('hidden', isDark);
        });
    </script>
</body>
</html>
