<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdulrahman Shunnar | InfoSec Specialist & Java Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3b82f6',
                        dark: '#0f172a',
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Poppins', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .hero-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* تحسين مظهر زر التبديل لضمان عدم تداخل الأيقونات */
        #theme-toggle i {
            display: none; /* إخفاء الأيقونات افتراضياً */
        }
        
        /* إظهار أيقونة الشمس فقط في الوضع المظلم */
        .dark #sun-icon {
            display: block;
        }
        
        /* إظهار أيقونة القمر فقط في الوضع الفاتح */
        html:not(.dark) #moon-icon {
            display: block;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 overflow-x-hidden">

    <nav class="fixed w-full z-50 top-0 left-0 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="logo-container h-12 flex items-center">
                <img src="22.png" id="logo-day" alt="Logo" class="h-full object-contain block dark:hidden">
                <img src="33.png" id="logo-night" alt="Logo" class="h-full object-contain hidden dark:block">
            </div>
            
            <div class="hidden md:flex items-center justify-between w-full max-w-xl">
                <a href="#home" class="hover:text-primary transition font-medium">Home</a>
                <a href="#about" class="hover:text-primary transition font-medium">About</a>
                <a href="#skills" class="hover:text-primary transition font-medium">Skills</a>
                <a href="#projects" class="hover:text-primary transition font-medium">Projects</a>
                <a href="#contact" class="hover:text-primary transition font-medium">Contact</a>
            </div>

            <div class="flex items-center gap-3">
                <button id="theme-toggle" class="p-2.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:scale-110 transition flex items-center justify-center">
                    <i data-lucide="sun" id="sun-icon" class="w-5 h-5"></i>
                    <i data-lucide="moon" id="moon-icon" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </nav>

    <section id="home" class="min-h-screen pt-32 pb-20 flex items-center relative overflow-hidden">
        <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
            <div class="relative z-10 text-left">
                <h2 class="text-primary font-bold text-lg mb-4">Abdulrahman Shunnar</h2>
                <h1 class="text-5xl md:text-7xl font-extrabold mb-6 leading-tight">
                    <span>InfoSec Specialist</span> <br> 
                    <span class="text-transparent bg-clip-text hero-gradient">& Java Developer</span>
                </h1>
                <p class="text-lg text-slate-600 dark:text-slate-400 mb-8 max-w-lg">
                    A technical visionary combining network security with innovative software solutions.
                </p>
                <div class="flex gap-4">
                    <a href="#projects" class="px-8 py-4 hero-gradient text-white rounded-xl font-bold shadow-lg transition flex items-center gap-2">
                        <span>View Work</span>
                        <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script>
        // تهيئة الأيقونات
        lucide.createIcons();

        const themeToggle = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;

        // دالة تحديث الأيقونات عند التبديل
        function toggleTheme() {
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        themeToggle.addEventListener('click', toggleTheme);

        // تطبيق الثيم المحفوظ عند تحميل الصفحة
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
        } else {
            htmlElement.classList.remove('dark');
        }
    </script>
</body>
</html>
