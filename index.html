<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdulrahman Shunnar | Portfolio</title>
    
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3b82f6',
                        dark: '#0f172a',
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            transition: background-color 0.3s ease, color 0.3s ease; 
        }
        .hero-gradient { 
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); 
        }
        
        /* إعدادات زر التبديل وتأثير القلب (Flip) */
        #theme-toggle {
            perspective: 1000px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #theme-toggle i { 
            position: absolute; /* ضروري لجعل الأيقونات فوق بعضها تماماً أثناء الدوران */
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            backface-visibility: hidden;
            opacity: 0;
        }
        
        /* وضع النهار: اظهر القمر (للانتقال لليل) */
        html:not(.dark) #moon-icon { 
            opacity: 1;
            transform: rotateY(0deg);
        }
        html:not(.dark) #sun-icon {
            opacity: 0;
            transform: rotateY(-180deg);
        }
        
        /* وضع الليل: اظهر الشمس (للانتقال للنهار) */
        .dark #sun-icon { 
            opacity: 1;
            transform: rotateY(0deg);
        }
        .dark #moon-icon {
            opacity: 0;
            transform: rotateY(180deg);
        }

        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 overflow-x-hidden">

    <nav class="fixed w-full z-50 top-0 left-0 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="logo-container h-12 flex items-center">
                <img src="22.png" id="logo-day" alt="Logo" class="h-full object-contain block dark:hidden">
                <img src="33.png" id="logo-night" alt="Logo" class="h-full object-contain hidden dark:block">
            </div>
            
            <div class="hidden md:flex items-center justify-between w-full max-w-xl text-sm lg:text-base">
                <a href="#home" class="hover:text-primary transition font-medium">Home</a>
                <a href="#about" class="hover:text-primary transition font-medium">About</a>
                <a href="#skills" class="hover:text-primary transition font-medium">Skills</a>
                <a href="#projects" class="hover:text-primary transition font-medium">Projects</a>
                <a href="#mywritings" class="hover:text-primary transition font-medium">My Writings</a>
                <a href="#contact" class="hover:text-primary transition font-medium">Contact</a>
            </div>

            <div class="flex items-center gap-3">
                <button id="theme-toggle" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:scale-110 transition overflow-hidden">
                    <i data-lucide="sun" id="sun-icon" class="w-5 h-5"></i>
                    <i data-lucide="moon" id="moon-icon" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </nav>

    <section id="home" class="min-h-screen pt-32 pb-20 flex items-center relative overflow-hidden">
        <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
            <div class="relative z-10 text-left">
                <h2 class="text-primary font-bold text-lg mb-4">Abdulrahman Shunnar</h2>
                <h1 class="text-5xl md:text-7xl font-extrabold mb-6 leading-tight">
                    <span>InfoSec Specialist</span> <br> 
                    <span class="text-transparent bg-clip-text hero-gradient">& Java Developer</span>
                </h1>
                <p class="text-lg text-slate-600 dark:text-slate-400 mb-8 max-w-lg">
                    A technical visionary combining network security with innovative software solutions. 
                    Based on a solid academic background at UCAS.
                </p>
                <div class="flex flex-wrap gap-4">
                    <a href="#projects" class="px-8 py-4 hero-gradient text-white rounded-xl font-bold shadow-lg shadow-blue-500/20 hover:shadow-blue-500/40 transition flex items-center gap-2">
                        <span>View My Work</span>
                        <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </a>
                    <a href="#" class="px-8 py-4 border border-slate-200 dark:border-slate-800 rounded-xl font-bold hover:bg-slate-100 dark:hover:bg-slate-900 transition">Download CV</a>
                </div>
            </div>
            
            <div class="relative flex justify-center items-center">
                <div class="relative w-full max-w-md aspect-[3/4] overflow-hidden rounded-[2.5rem] shadow-2xl z-10 border-8 border-white dark:border-slate-900">
                    <img src="day-photo.png" class="w-full h-full object-cover dark:hidden" alt="Profile Day">
                    <img src="night-photo.png" class="w-full h-full object-cover hidden dark:block" alt="Profile Night">
                </div>
                <div class="absolute -z-0 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] bg-blue-500/10 dark:bg-blue-500/5 blur-[100px] rounded-full"></div>
            </div>
        </div>
    </section>

    <footer class="py-12 border-t border-slate-200 dark:border-slate-800 text-center">
        <p class="text-slate-500 italic">© 2026 All Rights Reserved.</p>
    </footer>

    <script>
    // تهيئة الأيقونات
    lucide.createIcons();

    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;

    themeToggle.addEventListener('click', () => {
        const isDark = html.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        
        // لا حاجة لإعادة تهيئة lucide هنا لأننا نستخدم CSS للتحكم في الظهور والدوران
    });
    </script>
</body>
</html>
